<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  /*
   * Chroma-key color: #010102 couleur unique quasi-noire rendue transparente
   * par SetLayeredWindowAttributes(LWA_COLORKEY) en Python.
   * Ni le gradient du pill ni le texte ne contiennent cette couleur exacte.
   */
  html, body {
    width:100%; height:100%;
    background: #010102;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }

  /* La pilule seul element visible, le reste devient transparent via chroma. */
  #pill {
    display:none;
    align-items:center; gap:11px;
    padding:10px 18px;
    border-radius:26px;
    background: linear-gradient(150deg, #252538 0%, #171728 100%);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      0 6px 24px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,0.22),
      inset 0 -1px 0 rgba(0,0,0,0.30);
    color:#fff;
    transform-origin: bottom center;
    white-space: nowrap;
    max-width: 90vw;
  }

  #pill.show {
    display:flex;
    animation:
      riseIn 0.5s cubic-bezier(0.34, 1.25, 0.64, 1) both,
      breathe 3.5s ease-in-out 0.5s infinite;
  }
  #pill.hide {
    display:flex;
    animation: sinkOut 0.3s cubic-bezier(0.55,0,1,0.7) forwards;
  }

  @keyframes riseIn {
    0%   { transform: translateY(20px) scale(0.72); opacity: 0; }
    50%  { opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes breathe {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-3px) scale(1.007); }
  }
  @keyframes sinkOut {
    to { transform: translateY(18px) scale(0.7); opacity: 0; }
  }

  /* Waveform */
  .wave {
    display:flex; align-items:center; gap:3px; height:16px; flex-shrink:0;
  }
  .wave i {
    width:3px; border-radius:3px;
    background: linear-gradient(to top, #5b8ef5, #b0ccff);
    animation: bar 1s ease-in-out infinite;
  }
  .wave i:nth-child(1){ animation-delay:0s   }
  .wave i:nth-child(2){ animation-delay:.15s }
  .wave i:nth-child(3){ animation-delay:.30s }
  .wave i:nth-child(4){ animation-delay:.45s }
  .wave i:nth-child(5){ animation-delay:.60s }
  @keyframes bar { 0%,100%{ height:3px } 50%{ height:15px } }

  /* Texte + caret */
  #txt {
    font-size:.85rem; color:#d0e4ff; letter-spacing:.012em;
    overflow:hidden; text-overflow:ellipsis; max-width:55vw;
    border-right:1.5px solid rgba(160,200,255,.7);
    padding-right:2px; min-width:3px;
    animation: caret .85s step-end infinite;
  }
  #txt.done { border-right-color:transparent; animation:none; }
  #txt:empty::before {
    content:"à l'écoute…"; opacity:.4; font-style:italic; font-size:.8rem;
  }
  @keyframes caret {
    0%,100% { border-right-color:rgba(160,200,255,.7) }
    50%      { border-right-color:transparent }
  }
</style>
</head>
<body>
  <div id="pill">
    <div class="wave"><i></i><i></i><i></i><i></i><i></i></div>
    <span id="txt"></span>
  </div>

<script>
  let _typeTimer = null;

  function showPill() {
    _clr();
    const p = document.getElementById('pill');
    p.classList.remove('hide');
    p.classList.add('show');
    const el = document.getElementById('txt');
    el.textContent = '';
    el.classList.remove('done');
  }

  function hidePill() {
    _clr();
    const p = document.getElementById('pill');
    p.classList.remove('show');
    p.classList.add('hide');
    setTimeout(() => {
      p.classList.remove('hide');
      p.style.display = 'none';
      document.getElementById('txt').textContent = '';
      document.getElementById('txt').classList.remove('done');
    }, 300);
  }

  function setText(t) {
    _clr();
    const el = document.getElementById('txt');
    el.classList.remove('done');
    const cur = el.textContent || '';
    const from = (t || '').startsWith(cur) ? cur.length : 0;
    if (from === 0) el.textContent = '';
    let i = from;
    const full = t || '';
    (function next() {
      if (i < full.length) {
        el.textContent = full.slice(0, i + 1);
        i++;
        _typeTimer = setTimeout(next, 26);
      } else {
        setTimeout(() => el.classList.add('done'), 700);
      }
    })();
  }

  function _clr() {
    if (_typeTimer) { clearTimeout(_typeTimer); _typeTimer = null; }
  }

  if (typeof window.pywebview === 'undefined') {
    setTimeout(() => { showPill(); setText('à l\'écoute…'); }, 80);
  }
</script>
</body>
</html>
